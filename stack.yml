# Stack Docker Swarm — SGR (Multi-Aplicação SGA)
#
# Diferente de administracao/comex/estoque/financeiro/rh: o SGR fala
# diretamente com o Postgres NATIVO do host (banco "sga", live/transacional),
# não com o container sga_db (banco "sga_multiapp", mirror unidirecional).
# Por isso não entra na rede sga_db_net — usa extra_hosts (host-gateway) para
# alcançar o Postgres do host a partir do container.
#
# Réplica única (replicas: 1): o SGR guarda estado de sessão em memória do
# processo (st.session_state) — múltiplas réplicas quebrariam o login.
#
# Imagem publicada no GHCR via scripts/deploy_local.sh (build+push manual,
# sem CI por enquanto). Deploy na VPS: docker stack deploy -c stack.yml sgr

services:
  web:
    image: ghcr.io/arecomarcelo/sgr:latest
    env_file: .env
    environment:
      TZ: America/Sao_Paulo
    entrypoint: ["/app/entrypoint.sh"]
    command:
      - "streamlit"
      - "run"
      - "app.py"
      - "--server.port=8110"
      - "--server.address=0.0.0.0"
      - "--server.headless=true"
      - "--browser.gatherUsageStats=false"
    extra_hosts:
      - "host-postgres:host-gateway"
    ports:
      - "127.0.0.1:8110:8110"
    networks:
      - traefik_public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8110/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.sgr.rule=Host(`sgr.oficialsport.com.br`)
      # tls=true (cert interno do Traefik), não tls.certresolver=letsencrypt —
      # mesmo motivo documentado no stack.yml da administracao: Traefik só na
      # porta 8443 (não a 443 real) faz o desafio TLS-ALPN-01 nunca completar.
      - traefik.http.routers.sgr.tls=true
      - traefik.http.services.sgr.loadbalancer.server.port=8110
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3

networks:
  traefik_public:
    external: true
